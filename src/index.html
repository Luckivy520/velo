<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo - 双链笔记</title>
  </head>
  <body>
    <header id="app-header">
      <h1 id="app-title">Velo</h1>
      <span id="app-subtitle">双链笔记</span>
      <div id="header-actions">
        <button id="btn-import" title="导入数据">导入</button>
        <button id="btn-export" title="导出数据">导出</button>
      </div>
    </header>
    <input type="file" id="import-file-input" accept=".json" class="hidden-input" />

    <main id="app-main">
      <!-- Left: Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-toolbar">
          <button id="btn-new-note" class="btn-primary">+ 新建笔记</button>
          <input id="search-input" type="text" placeholder="搜索笔记... (Ctrl+K)" />
        </div>
        <ul id="note-list"></ul>
      </aside>

      <!-- Center: Editor -->
      <section id="editor-panel">
        <div id="editor-toolbar">
          <input id="title-input" type="text" placeholder="笔记标题" />
          <div id="editor-actions">
            <button id="btn-save">保存</button>
            <button id="btn-delete" class="btn-danger">删除</button>
            <button id="btn-toggle-preview">预览</button>
          </div>
        </div>
        <div id="editor-container">
          <textarea id="content-input" placeholder="开始写作...使用 [[标题]] 创建链接"></textarea>
          <div id="preview-pane" class="hidden"></div>
        </div>
        <div id="status-bar">
          <span id="word-count">0 字</span>
          <span id="save-status"></span>
        </div>
      </section>

      <!-- Right: Graph + Backlinks -->
      <aside id="right-panel">
        <div id="graph-container">
          <canvas id="graph-canvas"></canvas>
        </div>
        <div id="backlinks-container">
          <h3>反向链接</h3>
          <ul id="backlinks-list"></ul>
        </div>
      </aside>
    </main>

    <script src="vendor/marked.min.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
