<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo</title>
  </head>
  <body>
    <header id="app-header">
      <h1 id="app-title">Velo</h1>
      <span id="app-subtitle">Notes</span>
      <div id="header-actions">
        <button id="btn-import" title="Import Data">Import</button>
        <button id="btn-export" title="Export Data">Export</button>
      </div>
    </header>
    <input type="file" id="import-file-input" accept=".json" class="hidden-input" />

    <main id="app-main">
      <!-- Left: Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-toolbar">
          <button id="btn-new-note" class="btn-primary">+ New Note</button>
          <input id="search-input" type="text" placeholder="Search notes... (Ctrl+K)" />
        </div>
        <ul id="note-list"></ul>
      </aside>

      <!-- Center: Editor -->
      <section id="editor-panel">
        <div id="editor-toolbar">
          <input id="title-input" type="text" placeholder="Note title" />
          <div id="editor-actions">
            <button id="btn-save">Save</button>
            <button id="btn-delete" class="btn-danger">Delete</button>
            <button id="btn-toggle-preview">Preview</button>
          </div>
        </div>
        <div id="editor-container">
          <textarea id="content-input" placeholder="Start writing... Use [[title]] to create links"></textarea>
          <div id="preview-pane" class="hidden"></div>
        </div>
        <div id="status-bar">
          <span id="word-count">0 chars</span>
          <span id="save-status"></span>
        </div>
      </section>

      <!-- Right: Graph + Backlinks -->
      <aside id="right-panel">
        <div id="graph-container">
          <canvas id="graph-canvas"></canvas>
        </div>
        <div id="backlinks-container">
          <h3>Backlinks</h3>
          <ul id="backlinks-list"></ul>
        </div>
      </aside>
    </main>

    <script src="vendor/marked.min.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
