<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo</title>
  </head>
  <body>
    <header id="app-header">
      <div id="header-left">
        <h1 id="app-title">Velo</h1>
      </div>
      <div id="header-actions">
        <button id="btn-import" data-i18n="import">Import</button>
        <button id="btn-export" data-i18n="export">Export</button>
        <button id="btn-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 data-i18n="settings">Settings</h2>
          <button id="btn-close-settings" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <!-- Theme -->
          <div class="setting-group">
            <label data-i18n="theme">Theme</label>
            <div class="setting-control">
              <button id="btn-theme-light" class="btn-option" data-theme="light">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="5"></circle>
                  <line x1="12" y1="1" x2="12" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="23"></line>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                  <line x1="1" y1="12" x2="3" y2="12"></line>
                  <line x1="21" y1="12" x2="23" y2="12"></line>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <span data-i18n="lightMode">Light</span>
              </button>
              <button id="btn-theme-dark" class="btn-option" data-theme="dark">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <span data-i18n="darkMode">Dark</span>
              </button>
            </div>
          </div>
          
          <!-- Language -->
          <div class="setting-group">
            <label data-i18n="language">Language</label>
            <div class="setting-control">
              <button id="btn-lang-en" class="btn-option" data-lang="en">English</button>
              <button id="btn-lang-zh" class="btn-option" data-lang="zh">中文</button>
            </div>
          </div>
          
          <!-- Shortcuts -->
          <div class="setting-group">
            <label data-i18n="shortcuts">Shortcuts</label>
            <div class="shortcuts-list">
              <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>N</kbd>
                <span data-i18n="shortcutNew">New note</span>
              </div>
              <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>K</kbd>
                <span data-i18n="shortcutSearch">Search</span>
              </div>
              <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>S</kbd>
                <span data-i18n="shortcutSave">Save</span>
              </div>
              <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>B</kbd>
                <span data-i18n="shortcutToggleSidebar">Toggle sidebar</span>
              </div>
              <div class="shortcut-item">
                <kbd>Ctrl</kbd> + <kbd>P</kbd>
                <span data-i18n="shortcutTogglePreview">Toggle preview</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <input type="file" id="import-file-input" accept=".json" class="hidden-input" />

    <main id="app-main">
      <!-- Left: Sidebar -->
      <aside id="sidebar">
        <div id="sidebar-toolbar">
          <button id="btn-new-note" class="btn-primary" data-i18n="newNote">+ New Note</button>
          <input id="search-input" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="Search notes... (Ctrl+K)" />
        </div>
        <ul id="note-list"></ul>
      </aside>

      <!-- Center: Editor -->
      <section id="editor-panel">
        <div id="editor-toolbar">
          <input id="title-input" type="text" data-i18n-placeholder="titlePlaceholder" placeholder="Note title" />
          <div id="editor-actions">
            <button id="btn-save" data-i18n="save">Save</button>
            <button id="btn-delete" class="btn-danger" data-i18n="delete">Delete</button>
            <button id="btn-toggle-preview" data-i18n="preview">Preview</button>
          </div>
        </div>
        <div id="editor-container">
          <textarea id="content-input" data-i18n-placeholder="contentPlaceholder" placeholder="Start writing... Use [[title]] to create links"></textarea>
          <div id="preview-pane" class="hidden"></div>
        </div>
        <div id="status-bar">
          <span id="word-count">0 <span data-i18n="chars">chars</span></span>
          <span id="save-status"></span>
        </div>
      </section>

      <!-- Right: Graph + Backlinks -->
      <aside id="right-panel">
        <div id="graph-container">
          <canvas id="graph-canvas"></canvas>
        </div>
        <div id="backlinks-container">
          <h3 data-i18n="backlinks">Backlinks</h3>
          <ul id="backlinks-list"></ul>
        </div>
      </aside>
    </main>

    <script src="vendor/marked.min.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
